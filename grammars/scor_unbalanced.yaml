query:
  root: select
  max_depth: 4

set_operation:
  operation_types: [UNION, UNION ALL, EXCEPT, INTERSECT]
  mixed_operations: true
  query_count: [2, 3]
  projection_count: [1, 3]
  categories: [numeric, string, datetime]

select:
  distinct_prob: 0.1
  cte:
    enabled_prob: 0.25
    count: [1, 2]
    projection_count: [2, 3]
    where:
      enabled_prob: 0.8
    having:
      enabled_prob: 0.35
    order_by:
      enabled_prob: 0.2
    limit:
      enabled_prob: 0.2
  projection:
    count: [3, 4]
    expr_kinds:
      column: 0.35
      function: 0.35
      arithmetic: 0.1
      bool_expr: 0.1
      subquery: 0.07
      window_function: 0.03
    function_types:
      aggregate: 0.45
      scalar: 0.55
    bool_expr:
      max_depth: 1
  from:
    source_kinds:
      join: 0.55
      derived_table: 0.2
      cte: 0.1
      table: 0.15
    join_source_kinds:
      table: 0.45
      derived_table: 0.35
      cte: 0.2
    join_types: [INNER, LEFT, RIGHT, CROSS]
    max_joins: 2
  where:
    enabled_prob: 0.9
  having:
    enabled_prob: 0.45
  order_by:
    enabled_prob: 0.25
    max_columns: 1
  limit:
    enabled_prob: 0.2
    range: [1, 50]

bool_expr:
  max_depth: 4
  atom_prob: 0.15
  atoms:
    comparison: 0.25
    is_null: 0.08
    between: 0.14
    like: 0.11
    regexp: 0.05
    exists_subquery: 0.13
    in_subquery: 0.12
    not_in_subquery: 0.08
    any_all_subquery: 0.04
  connectors:
    and: 0.7
    or: 0.25
    not: 0.05
  connector_operands:
    and:
      left:
        kind: bool_expr
      right:
        kind: atom
    or:
      left:
        kind: bool_expr
      right:
        kind: atom
    not:
      operand:
        kind: atom

join_on:
  max_depth: 3
  atom_prob: 0.25
  atoms:
    column_comparison: 0.35
    comparison: 0.12
    between: 0.08
    like: 0.05
    in_subquery: 0.16
    not_in_subquery: 0.08
    exists_subquery: 0.16
  connectors:
    and: 0.65
    or: 0.3
    not: 0.05
  connector_operands:
    and:
      left:
        kind: bool_expr
      right:
        kind: atom
    or:
      left:
        kind: bool_expr
      right:
        kind: atom
    not:
      operand:
        kind: atom

having_bool:
  max_depth: 2
  atom_prob: 0.45
  atoms:
    aggregate_comparison: 0.75
    group_expression_comparison: 0.25
  connectors:
    and: 0.65
    or: 0.25
    not: 0.1
  connector_operands:
    and:
      left:
        kind: bool_expr
      right:
        kind: atom
    or:
      left:
        kind: bool_expr
      right:
        kind: atom
    not:
      operand:
        kind: atom

subquery:
  max_depth: 3
  correlated_prob: 0.0
  in_subquery:
    from:
      source_kinds:
        table: 0.25
        join: 0.55
        derived_table: 0.15
        cte: 0.05
      join_source_kinds:
        table: 0.45
        derived_table: 0.4
        cte: 0.15
      join_types: [INNER, LEFT, RIGHT, CROSS]
      max_joins: 2
    projection:
      expr_kinds: [column, function, arithmetic, literal]
    where:
      enabled_prob: 0.75
      max_depth: 2
    order_by:
      enabled_prob: 0.35
    limit:
      enabled_prob: 0.0
      range: [1, 80]
  exists_subquery:
    from:
      source_kinds:
        table: 0.25
        join: 0.55
        derived_table: 0.15
        cte: 0.05
      join_source_kinds:
        table: 0.45
        derived_table: 0.4
        cte: 0.15
      join_types: [INNER, LEFT, RIGHT, CROSS]
      max_joins: 2
    projection:
      expr_kinds: [literal, column, function]
    where:
      enabled_prob: 0.75
      max_depth: 2
    order_by:
      enabled_prob: 0.35
    limit:
      enabled_prob: 0.35
      range: [1, 80]
  scalar_subquery:
    projection:
      expr_kinds: [column, function, arithmetic, literal]
    where:
      enabled_prob: 0.7
      max_depth: 2
    order_by:
      enabled_prob: 0.45

window_function:
  functions:
    ROW_NUMBER: 1.0
    RANK: 0.8
    DENSE_RANK: 0.8
    NTILE: 0.4
    LAG: 0.4
    LEAD: 0.4
    FIRST_VALUE: 0.3
    LAST_VALUE: 0.3
  partition_by:
    enabled_prob: 0.35
    max_columns: 1
  order_by:
    enabled_prob: 0.95
    max_columns: 1
  frame:
    enabled_prob: 0.0
    clauses:
      - ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

arithmetic:
  operators: ["+", "-", "*", "/", "%"]

profiles:
  left_deep_and:
    weight: 0.45
    bool_expr:
      max_depth: 5
      atom_prob: 0.05
      connectors:
        and: 1.0
      connector_operands:
        and:
          left:
            kind: bool_expr
          right:
            kind: atom

  left_deep_or:
    weight: 0.2
    bool_expr:
      max_depth: 5
      atom_prob: 0.08
      connectors:
        or: 1.0
      connector_operands:
        or:
          left:
            kind: bool_expr
          right:
            kind: atom

  and_true_chain:
    weight: 0.2
    bool_expr:
      max_depth: 4
      atom_prob: 0.0
      connectors:
        and: 1.0
      connector_operands:
        and:
          left:
            kind: bool_expr
          right:
            kind: literal
            value: true

  mixed_unbalanced:
    weight: 0.15
    bool_expr:
      max_depth: 5
      atom_prob: 0.12
      connectors:
        and: 0.65
        or: 0.3
        not: 0.05
      connector_operands:
        and:
          left:
            kind: bool_expr
          right:
            kind: atom
        or:
          left:
            kind: bool_expr
          right:
            kind: atom
        not:
          operand:
            kind: atom
