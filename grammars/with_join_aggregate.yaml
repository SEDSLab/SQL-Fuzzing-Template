query:
  root: select
  max_depth: 3

set_operation:
  operation_types: [UNION, UNION ALL, EXCEPT, INTERSECT]
  mixed_operations: true
  query_count: [2, 3]
  projection_count: [1, 3]
  categories: [numeric, string, datetime]

select:
  distinct_prob: 0.15
  cte:
    enabled_prob: 0.45
    count: [1, 2]
    projection_count: [2, 3]
    where:
      enabled_prob: 0.55
    having:
      enabled_prob: 0.55
    order_by:
      enabled_prob: 0.25
    limit:
      enabled_prob: 0.25
  projection:
    count: [3, 4]
    expr_kinds:
      column: 0.16
      function: 0.55
      window_function: 0.1
      arithmetic: 0.05
      bool_expr: 0.04
      subquery: 0.1
    function_types:
      aggregate: 0.65
      scalar: 0.35
    bool_expr:
      max_depth: 1
  from:
    source_kinds:
      join: 0.65
      cte: 0.15
      table: 0.2
    join_source_kinds:
      cte: 0.25
      derived_table: 0.35
      table: 0.4
    join_types: [INNER, LEFT, RIGHT, CROSS]
    max_joins: 2
  where:
    enabled_prob: 0.45
  having:
    enabled_prob: 0.65
  order_by:
    enabled_prob: 0.2
    max_columns: 1
  limit:
    enabled_prob: 0.15
    range: [1, 50]

bool_expr:
  max_depth: 2
  atom_prob: 0.65
  atoms:
    comparison: 0.28
    is_null: 0.1
    between: 0.12
    like: 0.1
    regexp: 0.05
    exists_subquery: 0.15
    in_subquery: 0.12
    not_in_subquery: 0.05
    any_all_subquery: 0.03
  connectors:
    and: 0.45
    or: 0.45
    not: 0.1
  connector_operands:
    and:
      left:
        kind: bool_expr
      right:
        kind: bool_expr
    or:
      left:
        kind: bool_expr
      right:
        kind: bool_expr
    not:
      operand:
        kind: bool_expr

join_on:
  max_depth: 2
  atom_prob: 0.65
  atoms:
    column_comparison: 0.36
    comparison: 0.12
    between: 0.08
    like: 0.06
    in_subquery: 0.16
    not_in_subquery: 0.06
    exists_subquery: 0.16
  connectors:
    and: 0.45
    or: 0.45
    not: 0.1
  connector_operands:
    and:
      left:
        kind: bool_expr
      right:
        kind: bool_expr
    or:
      left:
        kind: bool_expr
      right:
        kind: bool_expr
    not:
      operand:
        kind: bool_expr

having_bool:
  max_depth: 2
  atom_prob: 0.65
  atoms:
    aggregate_comparison: 0.75
    group_expression_comparison: 0.25
  connectors:
    and: 0.5
    or: 0.35
    not: 0.15
  connector_operands:
    and:
      left:
        kind: bool_expr
      right:
        kind: bool_expr
    or:
      left:
        kind: bool_expr
      right:
        kind: bool_expr
    not:
      operand:
        kind: bool_expr

subquery:
  max_depth: 2
  correlated_prob: 0.0
  in_subquery:
    from:
      source_kinds:
        table: 0.45
        join: 0.4
        derived_table: 0.1
        cte: 0.05
      join_source_kinds:
        table: 0.55
        derived_table: 0.3
        cte: 0.15
      join_types: [INNER, LEFT, RIGHT, CROSS]
      max_joins: 2
    projection:
      expr_kinds: [column, function, arithmetic, literal]
    where:
      enabled_prob: 0.6
      max_depth: 1
    order_by:
      enabled_prob: 0.25
    limit:
      enabled_prob: 0.0
      range: [1, 50]
  exists_subquery:
    from:
      source_kinds:
        table: 0.4
        join: 0.45
        derived_table: 0.1
        cte: 0.05
      join_source_kinds:
        table: 0.55
        derived_table: 0.3
        cte: 0.15
      join_types: [INNER, LEFT, RIGHT, CROSS]
      max_joins: 2
    projection:
      expr_kinds: [literal, column]
    where:
      enabled_prob: 0.6
      max_depth: 1
    order_by:
      enabled_prob: 0.25
    limit:
      enabled_prob: 0.25
      range: [1, 50]
  scalar_subquery:
    projection:
      expr_kinds: [column, function, arithmetic, literal]
    where:
      enabled_prob: 0.6
      max_depth: 1
    order_by:
      enabled_prob: 0.5

window_function:
  functions:
    ROW_NUMBER: 1.0
    RANK: 0.8
    DENSE_RANK: 0.8
    NTILE: 0.4
    LAG: 0.5
    LEAD: 0.5
    FIRST_VALUE: 0.4
    LAST_VALUE: 0.4
  partition_by:
    enabled_prob: 0.45
    max_columns: 1
  order_by:
    enabled_prob: 0.95
    max_columns: 1
  frame:
    enabled_prob: 0.0
    clauses:
      - ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

arithmetic:
  operators: ["+", "-", "*", "/", "%"]
